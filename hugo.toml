baseURL = "https://yidaweng.github.io"
title = "Yida Weng"
theme = "PaperMod"
enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
locale = "en"

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

[pagination]
pagerSize = 10

[params]
env = "production"
description = "Reinforcement learning, AI safety, and engineering"
author = "Yida Weng"
defaultTheme = "auto"
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
comments = false
math = true

[params.homeInfoParams]
Title = "Hi, I'm Yida"
Content = """
I'm a reinforcement learning engineer. This blog documents my exploration of RL exploration — the mathematics and engineering behind curiosity-driven agents.
"""

[[params.socialIcons]]
name = "github"
url = "https://github.com/YidaWeng"

[[params.socialIcons]]
name = "x"
url = "https://x.com/yidaweng"

[menu]
[[menu.main]]
name = "Posts"
url = "/posts"
weight = 1

[[menu.main]]
name = "Search"
url = "/search"
weight = 2

[[menu.main]]
name = "Archives"
url = "/archives"
weight = 3

[[menu.main]]
name = "Tags"
url = "/tags"
weight = 4

[[menu.main]]
name = "Code"
url = "https://github.com/YidaWeng/rl-exploration-poc"
weight = 5

[[menu.main]]
name = "About"
url = "/about"
weight = 6
